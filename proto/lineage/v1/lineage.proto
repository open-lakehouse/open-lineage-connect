syntax = "proto3";
package lineage.v1;

option go_package = "github.com/open-lakehouse/open-lineage-service/gen/lineage/v1;lineagev1";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

message RunEvent {
  string event_type = 1 [(buf.validate.field).required = true];
  google.protobuf.Timestamp event_time = 2 [(buf.validate.field).required = true];
  Run run = 3;
  Job job = 4;
  repeated InputDataset inputs = 5;
  repeated OutputDataset outputs = 6;
  string producer = 7 [(buf.validate.field).required = true];
  string raw_json = 8;
  string schema_url = 9;
}

message JobEvent {
  google.protobuf.Timestamp event_time = 1 [(buf.validate.field).required = true];
  string producer = 2 [(buf.validate.field).required = true];
  string schema_url = 3;
  Job job = 4;
  repeated InputDataset inputs = 5;
  repeated OutputDataset outputs = 6;
  string raw_json = 7;
}

message DatasetEvent {
  google.protobuf.Timestamp event_time = 1 [(buf.validate.field).required = true];
  string producer = 2 [(buf.validate.field).required = true];
  string schema_url = 3;
  StaticDataset dataset = 4;
  string raw_json = 5;
}

message StaticDataset {
  string namespace = 1;
  string name = 2;
  google.protobuf.Struct facets = 3;
  ColumnLineageDatasetFacet column_lineage = 4;
}

message OpenLineageEvent {
  oneof event {
    RunEvent run_event = 1;
    JobEvent job_event = 2;
    DatasetEvent dataset_event = 3;
  }
}

message Run {
  string run_id = 1;
  google.protobuf.Struct facets = 2;
}

message Job {
  string namespace = 1;
  string name = 2;
  google.protobuf.Struct facets = 3;
}

message InputDataset {
  string namespace = 1;
  string name = 2;
  google.protobuf.Struct facets = 3;
  google.protobuf.Struct input_facets = 4;
  ColumnLineageDatasetFacet column_lineage = 5;
}

message OutputDataset {
  string namespace = 1;
  string name = 2;
  google.protobuf.Struct facets = 3;
  google.protobuf.Struct output_facets = 4;
  ColumnLineageDatasetFacet column_lineage = 5;
}

// ColumnLineageDatasetFacet is a typed model of the OpenLineage 1-2-0
// `ColumnLineageDatasetFacet` (https://openlineage.io/spec/facets/1-2-0/ColumnLineageDatasetFacet.json).
//
// Carrying it as a strong proto type — rather than burying it inside
// `google.protobuf.Struct facets` — lets downstream Go/Rust readers consume
// column lineage without re-parsing arbitrary JSON shapes, which is important
// because nested struct/array columns can blow past `Struct`'s practical
// nesting depth (~100 levels) on real-world plans.
message ColumnLineageDatasetFacet {
  // Per-output-field lineage, keyed by output field name.
  map<string, OutputFieldLineage> fields = 1;

  // Dataset-level dependencies that affect the whole output (filters, joins,
  // group-by columns, sort keys, window partitioning, etc.). These do not
  // map to a single output column.
  repeated InputField dataset = 2;
}

// Lineage of a single output column. `inputFields` is the canonical mapping;
// `transformation_description` and `transformation_type` mirror the deprecated
// fields in the OpenLineage spec and are kept here for spec-completeness.
message OutputFieldLineage {
  repeated InputField input_fields = 1;
  string transformation_description = 2 [deprecated = true];
  string transformation_type = 3 [deprecated = true];
}

// A single column-level dependency on a source dataset's field.
message InputField {
  string namespace = 1 [(buf.validate.field).required = true];
  string name = 2 [(buf.validate.field).required = true];
  string field = 3 [(buf.validate.field).required = true];
  repeated FieldTransformation transformations = 4;
}

// Describes the kind of transformation that connects an input field to an
// output column.
//
// `type` is one of:
//   - DIRECT   — input value flows into the output value
//   - INDIRECT — input affects the output's row set / ordering / grouping
// `subtype` further qualifies the transformation. Common values:
//   IDENTITY, TRANSFORMATION, AGGREGATION, JOIN, GROUP_BY, FILTER, SORT,
//   WINDOW, CONDITIONAL.
// `masking` is true for transformations that intentionally remove signal
// from the input (hashes, redactions, regexp_replace-as-mask, etc.).
message FieldTransformation {
  string type = 1;
  string subtype = 2;
  string description = 3;
  bool masking = 4;
}

message IngestEventRequest {
  RunEvent event = 1;
}

message IngestEventResponse {
  string status = 1;
}

message IngestBatchRequest {
  repeated RunEvent events = 1;
}

message IngestBatchResponse {
  int32 ingested = 1;
}

message IngestOpenLineageBatchRequest {
  repeated OpenLineageEvent events = 1;
}

message IngestOpenLineageBatchResponse {
  string status = 1;
  BatchSummary summary = 2;
  repeated FailedEvent failed_events = 3;
}

message BatchSummary {
  int32 received = 1;
  int32 successful = 2;
  int32 failed = 3;
  int32 retriable = 4;
  int32 non_retriable = 5;
}

message FailedEvent {
  int32 index = 1;
  string reason = 2;
  bool retriable = 3;
}

message QueryLineageRequest {
  string job_namespace = 1;
  string job_name = 2;
  int32 depth = 3;
}

message LineageNode {
  string node_type = 1;
  string namespace = 2;
  string name = 3;
  repeated LineageEdge edges = 4;
}

message LineageEdge {
  string source_namespace = 1;
  string source_name = 2;
  string target_namespace = 3;
  string target_name = 4;
  string relationship = 5;
}

message QueryLineageResponse {
  repeated LineageNode nodes = 1;
}

service LineageService {
  rpc IngestEvent(IngestEventRequest) returns (IngestEventResponse);
  rpc IngestBatch(IngestBatchRequest) returns (IngestBatchResponse);
  rpc IngestOpenLineageBatch(IngestOpenLineageBatchRequest) returns (IngestOpenLineageBatchResponse);
  rpc QueryLineage(QueryLineageRequest) returns (QueryLineageResponse);
}
