version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: gen
    opt: paths=source_relative
  # Java proto message classes for the Spark plugin. Output is committed so CI
  # runners without `buf` can build the plugin directly. We deliberately do not
  # generate ConnectRPC stubs here: connect-kotlin's suspend-function API is
  # awkward from Scala, so the plugin drives `com.connectrpc.ProtocolClient`
  # directly using these Java proto messages.
  - remote: buf.build/protocolbuffers/java
    out: spark-openlineage-plugin/src/main/generated
