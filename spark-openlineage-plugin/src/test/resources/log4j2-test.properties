# Test-only logging: quiet Spark's INFO chatter so test output stays readable.
# Our plugin code logs at INFO, Spark at WARN, and the noisiest framework
# components at ERROR.
status = error
name = SparkOpenLineageTestLogging

appender.console.type = Console
appender.console.name = stdout
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} %-5p %c{1}: %m%n

rootLogger.level = warn
rootLogger.appenderRef.stdout.ref = stdout

# Our plugin: stay at INFO so test failures have context.
logger.openlakehouse.name = com.openlakehouse
logger.openlakehouse.level = info

# Silence Spark's most verbose subsystems.
logger.spark.name = org.apache.spark
logger.spark.level = warn
logger.sparksql.name = org.apache.spark.sql
logger.sparksql.level = warn
logger.sparkexec.name = org.apache.spark.executor
logger.sparkexec.level = warn
logger.sparkscheduler.name = org.apache.spark.scheduler
logger.sparkscheduler.level = warn
logger.sparkstorage.name = org.apache.spark.storage
logger.sparkstorage.level = warn
logger.sparknetwork.name = org.apache.spark.network
logger.sparknetwork.level = warn

# Silence Hadoop/Parquet writers — they're fine, just chatty.
logger.parquet.name = org.apache.parquet
logger.parquet.level = warn
logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = warn
