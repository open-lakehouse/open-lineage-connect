name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_connect_e2e:
        description: "Run the Spark Connect end-to-end job"
        type: boolean
        default: false

permissions:
  contents: read

# bufbuild/buf-setup-action@v1 and arduino/setup-protoc@v3 still ship as
# Node.js 20 JS actions (no Node.js 24 release exists yet). GitHub is forcing
# Node.js 20 actions onto Node.js 24 starting 2026-06-16; opt in early so the
# deprecation warning clears and the actions keep working.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  go-test:
    name: Go lineage service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/lineage
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/lineage/go.mod
          cache-dependency-path: services/lineage/go.sum
      - name: go test
        run: go test ./... -coverprofile=coverage.out

  rust-test:
    name: Rust table service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      # crates/table-service/build.rs runs connectrpc-build, which shells out to
      # `protoc`. buf-setup only provides `buf`, so install protoc explicitly or
      # the build script panics with "failed to spawn protoc".
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: cargo test
        run: make rust-test

  spark-plugin-test:
    name: Spark OpenLineage plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: sbt test
        run: make spark-plugin-test

  # True Spark Connect server end-to-end. Heavier than the in-JVM smoke test
  # (it boots a real Connect server and drives it from a remote session), so it
  # runs only on manual dispatch with the flag set. This is the realization of
  # the previously-deferred `spark-connect-compat` follow-up.
  spark-connect-e2e:
    name: Spark Connect E2E
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_connect_e2e }}
    needs: spark-plugin-test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Spark Connect E2E
        run: make spark-connect-e2e
